version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - ac-network

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./ac_repair.db
      - ADMIN_SECRET_KEY=your-secret-key-here
    volumes:
      - ./backend/data:/app/data
    networks:
      - ac-network

networks:
  ac-network:
    driver: bridge